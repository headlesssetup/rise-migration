# pnpm settings (newer pnpm no longer reads the `pnpm` field in package.json).
# No `packages:` key — this repo is a single package, not a workspace; the file
# is used only for these settings.

# Build-script approval.
#   pnpm 11+ uses this `allowBuilds` map (package -> allowed-to-run-scripts).
#   - esbuild needs its postinstall (used by WXT / Vite / Vitest).
#   - spawn-sync (legacy sync-spawn shim via wxt -> web-ext-run -> fx-runner,
#     the Firefox runner we don't use) is explicitly NOT built — `false`
#     acknowledges it so pnpm doesn't raise ERR_PNPM_IGNORED_BUILDS.
allowBuilds:
  esbuild: true
  spawn-sync: false

# Equivalent settings for pnpm 10.x (ignored by pnpm 11, which uses allowBuilds).
onlyBuiltDependencies:
  - esbuild
ignoredBuiltDependencies:
  - spawn-sync

# Pin nanoid to an aged release. The latest 3.3.x (3.3.13, published
# 2026-06-18) is too new for strict `minimumReleaseAge` supply-chain policies;
# 3.3.11 (2025-03-18) satisfies the `^3.3` range postcss requires.
overrides:
  nanoid: 3.3.11
